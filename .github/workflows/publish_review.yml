name: 2 - Publish Review

# שלב 2: פרסום הסקירה שהצ'אט כתב.
# עורכים את review_output.json בממשק GitHub (או דוחפים מהמחשב) עם תשובת הצ'אט —
# ה-workflow רץ אוטומטית, מריץ את כל בדיקות האימות הדטרמיניסטיות, ומעדכן את data.json.
# אין כאן שום קריאה למודל שפה.
on:
  push:
    paths:
      - review_output.json
  workflow_dispatch: {}

concurrency:
  group: manual-review
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate and publish into data.json
        run: python paste_review.py review_output.json

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "::error::data.json unchanged — publish failed. Check the logs."
            exit 1
          fi
          git commit -m "publish: review into data.json ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git pull --rebase origin ${{ github.ref_name }}
          git push
          echo "### ✅ data.json עודכן — הסקירה באוויר" >> $GITHUB_STEP_SUMMARY
