name: 1 - Gather Review Input

on:
  workflow_dispatch:
    inputs:
      review_mode:
        description: "Choose review mode"
        required: true
        default: "daily_prep"
        type: choice
        options:
          - daily_prep
          - daily_summary
          - weekly_summary
          - intraday_update

permissions:
  contents: write

jobs:
  gather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Gather review input
        env:
          REVIEW_MODE: ${{ github.event.inputs.review_mode }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python gather_review_input.py "${{ github.event.inputs.review_mode }}"

      - name: Commit raw input files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add raw_review_input.md raw_review_input.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update raw review input"
            git push
          fi
