name: Tests

# מריץ את חבילת הבדיקות של שכבת האימות (paste_review.py) על כל שינוי קוד.
# לא רץ על פרסומי סקירות (review_output.json / data.json) — רק על שינויי Python.
on:
  pull_request:
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/tests.yml"
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest -q
